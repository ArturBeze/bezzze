version: '3.8'

services:
  # --- Existing n8n Service ---
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-bezzze-ru
    restart: unless-stopped
    env_file:
      - .env
    # n8n is accessed internally on the host at 127.0.0.1:5678
    ports:
      - 127.0.0.1:5678:5678
    volumes:
      - ./n8n_data:/home/node/n8n

  # --- New FastAPI Service ---
  fastapi:
    build:
      context: ./fastapi  # Points to the directory with the Dockerfile
    container_name: fastapi-bezzze-ru
    restart: unless-stopped
    # FastAPI is accessed internally on the host at 127.0.0.1:8000
    ports:
      - 127.0.0.1:8000:80

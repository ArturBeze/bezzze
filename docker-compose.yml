version: '3.8'

services:
  # --- 1. Обратный прокси Nginx ---
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"  # Для HTTP
      - "443:443" # Для HTTPS (если будете настраивать)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fastapi_app
      - n8n
    networks:
      - app_network
    restart: unless-stopped

  # --- 2. Сервис FastAPI ---
  fastapi_app:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: fastapi_service
    # Использование gunicorn/uvicorn с proxy-headers обязательно при работе за прокси
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers
    expose:
      - "8000"
    networks:
      - app_network
    restart: unless-stopped

  # --- 3. Сервис n8n ---
  n8n:
    image: n8nio/n8n
    container_name: n8n_service
    # N8N_HOST должен соответствовать домену для корректной работы вебхуков и UI
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_HOST=n8n.bezzze.ru
      - N8N_PROTOCOL=http # Прокси будет использовать HTTP для связи с n8n, даже если снаружи HTTPS
      - NODE_ENV=production
      - WEBHOOK_URL=http://n8n.bezzze.ru/
      - VIRTUAL_HOST=n8n.bezzze.ru # Используется Nginx
      - GENERIC_TIMEZONE=Europe/Paris # Замените на свой часовой пояс
    volumes:
      - n8n_data:/home/node/n8n
    depends_on:
      - postgres
    networks:
      - app_network
    restart: unless-stopped

  # --- 4. Сервис PostgreSQL для n8n ---
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

# --- Сети и тома ---
networks:
  app_network:
    driver: bridge

volumes:
  n8n_data:
  postgres_data:
